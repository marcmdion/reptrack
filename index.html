<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MD RepTrack - Minimalist Workout Log</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Premium Minimalist Dark Theme */
        :root {
            --bg-deep: #000000;
            --bg-surface: #0A0A0A;
            --bg-input: #111111;
            --accent: #00E676; /* Neon Green for highlights */
            --text-main: #FFFFFF;
            --text-muted: #6B7280;
            --border-light: #1A1A1A;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        /* UI Elements */
        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-light);
        }

        .input-field {
            background-color: var(--bg-input);
            border: 1px solid transparent;
            color: white;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: #333;
            background-color: #000;
            outline: none;
        }

        .btn-primary {
            background-color: var(--text-main);
            color: #000;
            font-weight: 600;
            transition: transform 0.1s active, opacity 0.2s;
        }
        
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        /* Minimalist Nav */
        .nav-link { color: var(--text-muted); transition: color 0.2s; }
        .nav-link.active { color: var(--text-main); }
        .nav-link.active i { color: var(--accent); }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .loading-spinner {
            border: 2px solid rgba(255,255,255,0.1);
            border-left-color: var(--text-main);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Modal Backdrop */
        .modal-bg { background-color: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        
        /* Webkit Date Input overrides for dark mode */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; opacity: 0.6; }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 20px); }
    </style>
</head>
<body class="bg-[var(--bg-deep)] text-[var(--text-main)] min-h-screen selection:bg-[#333]">

    <header class="fixed top-0 left-0 right-0 z-50 h-16 pt-safe flex justify-between items-center px-6 bg-black/80 backdrop-blur-lg border-b border-[#111]">
        <div class="flex items-center gap-2 tracking-widest text-lg font-bold">
            REP<span class="text-[#00E676] font-medium">TRACK</span>
        </div>
        <div id="user-info" class="flex items-center gap-4 hidden">
            <span id="user-email" class="text-[10px] text-gray-500 uppercase tracking-widest hidden sm:block"></span>
            <button id="logout-btn" class="text-gray-500 hover:text-white transition">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </div>
    </header>

    <div id="auth-screen" class="fixed inset-0 z-[60] flex flex-col items-center justify-center bg-black p-6 transition-opacity duration-500">
        <div class="text-center mb-12">
            <div class="w-16 h-16 bg-[#111] rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-bolt text-2xl text-[#00E676]"></i>
            </div>
            <h2 class="text-2xl font-semibold tracking-wide mb-2">Welcome</h2>
            <p class="text-sm text-gray-500">Minimalist workout tracking.</p>
        </div>
        
        <div class="w-full max-w-xs space-y-3">
            <input type="email" id="auth-email" placeholder="Email" class="input-field w-full p-4 rounded-2xl text-sm">
            <input type="password" id="auth-password" placeholder="Password" class="input-field w-full p-4 rounded-2xl text-sm">
            
            <div id="auth-error" class="text-red-400 text-xs text-center hidden pt-2"></div>

            <button id="login-btn" class="btn-primary w-full p-4 rounded-full text-sm mt-4 flex items-center justify-center gap-2">
                Sign In
            </button>
            <button id="register-btn" class="w-full p-4 rounded-full bg-transparent text-gray-400 text-sm hover:text-white transition">
                Create Account
            </button>
        </div>

        <div id="auth-loading" class="hidden mt-6">
            <div class="loading-spinner"></div>
        </div>
    </div>
    
    <div id="exercise-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center modal-bg p-4 animate-fade-in">
        <div class="bg-[#0a0a0a] w-full max-w-sm rounded-[24px] p-6 border border-[#1a1a1a] shadow-2xl relative flex flex-col max-h-[80vh]">
            <button id="close-modal-btn" class="absolute top-6 right-6 text-gray-500 hover:text-white">
                <i class="fa-solid fa-times"></i>
            </button>
            <h3 class="text-sm font-semibold uppercase tracking-widest text-gray-400 mb-6">Exercises</h3>
            
            <div class="flex gap-2 mb-6">
                <input type="text" id="new-exercise-input" placeholder="Add custom exercise..." class="input-field flex-1 p-3 rounded-xl text-sm">
                <button id="add-exercise-btn" class="bg-white text-black px-5 rounded-xl transition hover:opacity-90"><i class="fa-solid fa-plus"></i></button>
            </div>
            
            <div id="manage-exercise-list" class="flex-1 overflow-y-auto pr-2 space-y-1">
                </div>
        </div>
    </div>

    <main class="relative w-full pt-20 pb-32 px-5 sm:px-8">
        
        <div id="view-log" class="view-section space-y-8 max-w-md mx-auto">
            
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest">Session Date</span>
                    <div class="flex items-center bg-[#111] rounded-full px-4 py-1.5">
                        <input type="date" id="input-date" class="bg-transparent text-white text-xs font-medium focus:outline-none">
                    </div>
                </div>

                <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-3xl flex flex-col gap-4">
                    <div class="flex justify-between items-center w-full">
                        <h2 class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Rest Timer</h2>
                        <div id="timer-display" class="text-xl font-mono text-gray-400 transition-colors duration-300">00:00</div>
                    </div>
                    <div class="flex justify-between gap-2">
                        <button type="button" class="timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="30">30s</button>
                        <button type="button" class="timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="60">60s</button>
                        <button type="button" class="timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="90">90s</button>
                        <button type="button" class="timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="120">120s</button>
                        <button type="button" id="timer-cancel" class="hidden flex-1 bg-red-500/10 text-red-500 text-xs py-2.5 rounded-full transition-colors font-medium" title="Cancel Timer">Stop</button>
                    </div>
                </div>
            </div>

            <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-3xl flex items-center justify-between">
                <div>
                    <h2 class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Body Weight</h2>
                    <div class="text-white text-sm font-medium mt-1" id="last-bw-display">Not logged</div>
                </div>
                <div class="flex items-center gap-2">
                    <input type="number" id="input-bodyweight" placeholder="0.0" step="0.1" min="0" 
                        class="bg-[#111] w-20 p-3 rounded-xl text-center text-sm font-semibold focus:outline-none focus:ring-1 focus:ring-[#333] text-white disabled:opacity-50">
                    <button id="btn-save-bw" class="bg-white text-black p-3 rounded-xl transition-colors hover:bg-gray-200">
                        <i class="fa-solid fa-check text-xs"></i>
                    </button>
                </div>
            </div>

            <div class="animate-fade-in">
                <form id="log-form" class="space-y-5">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold ml-1 block">Exercise</label>
                            <button type="button" id="open-manager-btn" class="text-[10px] text-gray-500 hover:text-white uppercase tracking-widest transition">
                                Edit List
                            </button>
                        </div>
                        <div class="relative">
                            <select id="input-exercise" class="w-full bg-[#111] p-4 rounded-2xl text-base font-medium appearance-none text-white focus:outline-none focus:ring-1 focus:ring-[#333] transition" required>
                                <option value="" disabled selected>Select Exercise</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                        
                        <div class="flex justify-between items-start mt-2 ml-1 px-1">
                            <div id="log-advice-1rm" class="text-[10px] text-[#00E676] font-mono font-semibold h-4"></div>
                        </div>
                        <div id="log-recent-history" class="mt-2 ml-2 space-y-1.5 border-l border-[#222] pl-3"></div>
                    </div>

                    <div class="grid grid-cols-3 gap-3" id="log-inputs-grid">
                        <div class="col-span-1" id="container-sets">
                            <label class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold ml-1 mb-2 block text-center">Sets</label>
                            <div class="relative">
                                <select id="input-set-count" class="w-full bg-[#111] p-4 rounded-2xl text-base font-semibold text-center appearance-none text-white focus:outline-none focus:ring-1 focus:ring-[#333]">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-span-1" id="container-weight">
                            <label id="label-weight" class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold ml-1 mb-2 block text-center whitespace-nowrap">Load</label>
                            <input type="text" inputmode="text" id="input-weight" placeholder="kg / BW"
                                class="w-full bg-[#111] p-4 rounded-2xl text-base font-semibold text-center text-white placeholder-gray-600 focus:outline-none focus:ring-1 focus:ring-[#333] transition" required>
                        </div>
                        <div class="col-span-1" id="container-reps">
                            <label id="label-reps" class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold ml-1 mb-2 block text-center">Reps</label>
                            <div class="relative">
                                <select id="input-reps" class="w-full bg-[#111] p-4 rounded-2xl text-base font-semibold text-center appearance-none text-white focus:outline-none focus:ring-1 focus:ring-[#333]" required>
                                    <option value="" disabled selected>-</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary w-full p-4 rounded-full text-sm mt-4 tracking-wide shadow-lg">
                        Save Log
                    </button>
                </form>
            </div>

            <div class="pt-6">
                <div class="mb-6 relative">
                    <input type="text" id="today-session-name" placeholder="Name this session..." 
                        class="w-full bg-transparent text-xl font-bold text-white placeholder-gray-700 focus:outline-none pb-2 border-b border-[#222] focus:border-white transition-colors">
                </div>

                <div id="today-list" class="space-y-0">
                    <div class="text-center py-8 text-gray-600 text-xs tracking-wide">Ready to work.</div>
                </div>
            </div>
        </div>

        <div id="view-history" class="view-section hidden max-w-md mx-auto">
            <div class="flex justify-between items-end mb-8">
                <h2 class="text-2xl font-bold">History</h2>
            </div>
            <div id="history-list" class="space-y-0 pb-4">
                <div class="flex justify-center py-10"><div class="loading-spinner"></div></div>
            </div>
        </div>

        <div id="view-progress" class="view-section hidden max-w-md mx-auto space-y-6">
            <h2 class="text-2xl font-bold mb-2">Insights</h2>
            
            <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl">
                <div class="relative mb-6">
                    <select id="chart-exercise-select" class="w-full bg-[#111] p-3 rounded-xl text-sm font-medium appearance-none text-white focus:outline-none border border-transparent focus:border-[#333]">
                        <option value="">Select an exercise...</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </div>
                </div>
                
                <div class="relative h-80 w-full">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl">
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Best 1RM (Est)</div>
                    <div id="stat-est-1rm" class="text-2xl font-bold text-[#00E676]">-</div>
                </div>
                <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl">
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Peak Load</div>
                    <div id="stat-max-weight" class="text-2xl font-bold text-white">-</div>
                </div>
                <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl">
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Total Vol</div>
                    <div id="stat-total-volume" class="text-xl font-semibold text-gray-300">-</div>
                </div>
                <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl">
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Total Reps</div>
                    <div id="stat-total-reps" class="text-xl font-semibold text-gray-300">-</div>
                </div>
            </div>
        </div>

        <div id="view-flexibility" class="view-section hidden max-w-md mx-auto space-y-8">
            <h2 class="text-2xl font-bold">Mobility</h2>
            
            <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl flex flex-col gap-4">
                <div class="flex justify-between items-center w-full">
                    <div class="flex flex-col">
                        <h2 class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Interval Timer</h2>
                        <div id="flex-timer-status" class="text-[9px] text-[#00E676] font-medium hidden animate-pulse mt-0.5">Restarting in 5s...</div>
                    </div>
                    <div id="flex-timer-display" class="text-3xl font-mono text-gray-400 font-light transition-colors duration-300">00:00</div>
                </div>
                <div class="flex justify-between gap-2 mt-2">
                    <button type="button" class="flex-timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="30">30s</button>
                    <button type="button" class="flex-timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="45">45s</button>
                    <button type="button" class="flex-timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="60">60s</button>
                    <button type="button" class="flex-timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="90">90s</button>
                    <button type="button" id="flex-timer-cancel" class="hidden flex-1 bg-red-500/10 text-red-500 text-xs py-2.5 rounded-full transition-colors font-medium" title="Cancel Timer">Stop</button>
                </div>
            </div>

            <div class="flex p-1 bg-[#0a0a0a] rounded-full border border-[#111]">
                <button id="btn-flex-set-1" class="flex-1 py-2.5 text-xs tracking-wide font-semibold rounded-full bg-white text-black shadow-sm transition-all">Routine 1</button>
                <button id="btn-flex-set-2" class="flex-1 py-2.5 text-xs tracking-wide font-semibold rounded-full text-gray-500 hover:text-white transition-all">Routine 2</button>
            </div>

            <div class="">
                <h3 id="flex-set-title" class="text-xs font-bold uppercase tracking-widest text-[#00E676] mb-4 pb-2 border-b border-[#111]">Routine 1</h3>
                <div id="flex-list" class="space-y-0">
                    </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-lg border-t border-[#111] pb-safe pt-2">
        <div class="grid grid-cols-4 items-center h-14 max-w-md mx-auto">
            <button class="nav-link active flex flex-col items-center justify-center w-full h-full gap-1.5" data-target="view-log">
                <i class="fa-solid fa-pen-nib text-lg"></i>
                <span class="text-[9px] font-semibold uppercase tracking-widest">Log</span>
            </button>
            <button class="nav-link flex flex-col items-center justify-center w-full h-full gap-1.5" data-target="view-history">
                <i class="fa-solid fa-layer-group text-lg"></i>
                <span class="text-[9px] font-semibold uppercase tracking-widest">Past</span>
            </button>
            <button class="nav-link flex flex-col items-center justify-center w-full h-full gap-1.5" data-target="view-progress">
                <i class="fa-solid fa-chart-simple text-lg"></i>
                <span class="text-[9px] font-semibold uppercase tracking-widest">Data</span>
            </button>
            <button class="nav-link flex flex-col items-center justify-center w-full h-full gap-1.5" data-target="view-flexibility">
                <i class="fa-solid fa-wave-square text-lg"></i>
                <span class="text-[9px] font-semibold uppercase tracking-widest">Flex</span>
            </button>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, setDoc, doc, getDoc, updateDoc, arrayUnion, arrayRemove, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Utility: Toast Notifications
        // Must be declared first so other functions can use it without ReferenceError
        window.showToast = function(msg, isError = false) {
            const div = document.createElement('div');
            div.className = `fixed top-20 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full text-sm font-bold shadow-2xl z-[100] animate-fade-in ${isError ? 'bg-red-500 text-white' : 'bg-[#00E676] text-black'}`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0';
                div.style.transition = 'opacity 0.3s ease';
                setTimeout(() => div.remove(), 300);
            }, 3000);
        };

        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCHuTKvBK0R6poomtYMVtbqiamKbsoHX6o",
            authDomain: "md-reptrack.firebaseapp.com",
            projectId: "md-reptrack",
            storageBucket: "md-reptrack.firebasestorage.app",
            messagingSenderId: "196897655189",
            appId: "1:196897655189:web:22859f09e3ce8db015ce9c",
            measurementId: "G-W271BRRRDE"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;
        let unsubscribes = [];
        let chartInstance = null;
        
        // NEW user requested order
        const orderedDefaults = [
            "Bench Press",
            "Omni Row",
            "Incline DB Press",
            "Lateral Raises",
            "Tricep Pushdowns",
            "Hack Squat",
            "Romanian Deadlift",
            "Bulgarian Split Squat",
            "Standing Calf Raises",
            "Overhead Press",
            "Heavy Pulldowns",
            "Face Pull",
            "Hammer Curls",
            "EZ Bar Curls",
            "Trap Bar Deadlift",
            "Leg Press",
            "Leg Extensions",
            "Leg Curl"
        ];
        
        const cardioExercises = ["Bike/row conditioning", "Running"];

        let availableExercises = [...orderedDefaults];
        
        let workoutsCache = [];
        let bodyweightCache = [];
        let sessionsCache = {};
        let todayBWDocId = null;
        let allWorkoutsCache = [];

        // Populate Reps Dropdown
        const repSelect = document.getElementById('input-reps');
        for(let i=1; i<=30; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = i;
            repSelect.appendChild(opt);
        }

        // --- 2. AUTHENTICATION ---
        const authScreen = document.getElementById('auth-screen');
        const emailInput = document.getElementById('auth-email');
        const passwordInput = document.getElementById('auth-password');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const authLoading = document.getElementById('auth-loading');
        const authError = document.getElementById('auth-error');

        function showAuthError(msg) {
            authError.textContent = msg;
            authError.classList.remove('hidden');
        }

        function toggleAuthLoading(isLoading) {
            if(isLoading) {
                authLoading.classList.remove('hidden');
                loginBtn.disabled = true; registerBtn.disabled = true;
                authError.classList.add('hidden');
            } else {
                authLoading.classList.add('hidden');
                loginBtn.disabled = false; registerBtn.disabled = false;
            }
        }

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value; const password = passwordInput.value;
            if(!email || !password) { showAuthError("Enter email and password"); return; }
            toggleAuthLoading(true);
            try { await signInWithEmailAndPassword(auth, email, password); } 
            catch (error) {
                showAuthError("Invalid credentials."); toggleAuthLoading(false);

        // --- 3. EXERCISE MANAGEMENT ---
        const getSettingsRef = () => doc(db, 'users', currentUser.uid, 'settings', 'exercises');

        async function fetchUserExercises() {
            if (!currentUser) return;
            const ref = getSettingsRef();
            const snap = await getDoc(ref);

            if (snap.exists()) {
                const data = snap.data();
                
                // If they haven't been upgraded to version 2 of the list ordering:
                if (data.listVersion !== 2) {
                     // Upgrade path: Force the orderedDefaults, then append their unique custom ones
                     const lowerDefaults = orderedDefaults.map(e => e.toLowerCase());
                     let custom = (data.list || []).filter(ex => !lowerDefaults.includes(ex.toLowerCase()));
                     
                     // Deduplicate custom
                     const seen = new Set(lowerDefaults);
                     custom = custom.filter(ex => {
                         const lower = ex.toLowerCase();
                         if (seen.has(lower)) return false;
                         seen.add(lower);
                         return true;
                     });
                     
                     availableExercises = [...orderedDefaults, ...custom];
                } else {
                     // Version 2 exists: Trust the user's saved order!
                     let savedList = data.list || [];
                     
                     // Deduplicate saved list just in case
                     const uniqueList = [];
                     const seen = new Set();
                     for (const ex of savedList) {
                         const lower = ex.toLowerCase();
                         if (!seen.has(lower)) {
                             seen.add(lower);
                             uniqueList.push(ex);
                         }
                     }
                     
                     // Append any completely missing defaults (in case we add new ones to code)
                     const missingDefaults = orderedDefaults.filter(def => !seen.has(def.toLowerCase()));
                     availableExercises = [...uniqueList, ...missingDefaults];
                }
            } else {
                availableExercises = [...orderedDefaults];
            }
            
            // Save the list AND the version flag so we remember their custom order next time
            await setDoc(ref, { list: availableExercises, listVersion: 2 }, { merge: true });
            updateExerciseDropdown();
        }

        async function addExerciseToList(name) {
            if (!name) return;
            name = name.trim();
            name = name.charAt(0).toUpperCase() + name.slice(1);
            
            const lowerName = name.toLowerCase();
            const exists = availableExercises.some(ex => ex.toLowerCase() === lowerName);

            if (!exists) {
                availableExercises.push(name);
                updateExerciseDropdown();
                await setDoc(getSettingsRef(), { list: availableExercises }, { merge: true });
                const dropdown = document.getElementById('input-exercise');
                dropdown.value = name;
                dropdown.dispatchEvent(new Event('change'));
            }
        }

        async function removeExerciseFromList(name) {
            availableExercises = availableExercises.filter(e => e !== name);
            updateExerciseDropdown();
            await setDoc(getSettingsRef(), { list: availableExercises }, { merge: true });
            renderManagerList();
        }

        function updateExerciseDropdown() {
            const dropdown = document.getElementById('input-exercise');
            const currentVal = dropdown.value;
            dropdown.innerHTML = '<option value="" disabled selected>Select Exercise</option>';
            availableExercises.forEach(ex => {
                const opt = document.createElement('option');
                opt.value = ex; opt.textContent = ex;
                dropdown.appendChild(opt);
            });
            if(availableExercises.includes(currentVal)) dropdown.value = currentVal;
        }

        const modal = document.getElementById('exercise-modal');
        const managerList = document.getElementById('manage-exercise-list');
        
        document.getElementById('open-manager-btn').addEventListener('click', () => {
            modal.classList.remove('hidden'); renderManagerList();
        });
        document.getElementById('close-modal-btn').addEventListener('click', () => modal.classList.add('hidden'));

        async function moveExercise(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= availableExercises.length) return;
            const temp = availableExercises[index];
            availableExercises[index] = availableExercises[targetIndex];
            availableExercises[targetIndex] = temp;
            renderManagerList(); updateExerciseDropdown();
            await setDoc(getSettingsRef(), { list: availableExercises }, { merge: true });
        }

        async function performRename(oldName, newNameRaw) {
            let newName = newNameRaw.trim();
            const existingMatch = availableExercises.find(e => e.toLowerCase() === newName.toLowerCase());
            if (existingMatch) newName = existingMatch;

            try {
                window.showToast(`Updating records...`);
                const workoutsRef = collection(db, 'users', currentUser.uid, 'workouts');
                const q = query(workoutsRef, where("exercise", "==", oldName));
                const snap = await getDocs(q);
                
                const promises = [];
                snap.forEach(docSnap => promises.push(updateDoc(doc(db, 'users', currentUser.uid, 'workouts', docSnap.id), { exercise: newName })));
                await Promise.all(promises);

                const index = availableExercises.indexOf(oldName);
                if (index > -1) {
                    if (availableExercises.includes(newName) && newName !== oldName) availableExercises.splice(index, 1);
                    else availableExercises[index] = newName;
                } else if (!availableExercises.includes(newName)) availableExercises.push(newName);

                await setDoc(getSettingsRef(), { list: availableExercises }, { merge: true });
                updateExerciseDropdown(); renderManagerList();
                window.showToast(`Merged/Renamed to "${newName}"`);

                const dropdown = document.getElementById('input-exercise');
                if (dropdown.value === oldName || dropdown.value === newName) {
                    dropdown.value = newName; dropdown.dispatchEvent(new Event('change'));
                }
            } catch (err) {
                window.showToast("Error updating records", true); renderManagerList();
            }
        }

        function renderManagerList() {
            managerList.innerHTML = '';
            availableExercises.forEach((ex, index) => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center py-3 border-b border-[#111] last:border-0';
                
                const nameContainer = document.createElement('div');
                nameContainer.className = 'flex-1 min-w-0 mr-2';
                
                const nameText = document.createElement('span');
                nameText.className = 'text-sm text-gray-200 block w-full';
                nameText.textContent = ex;
                nameContainer.appendChild(nameText);

                const controls = document.createElement('div');
                controls.className = 'flex gap-3 items-center shrink-0';

                const upBtn = document.createElement('button');
                upBtn.innerHTML = '<i class="fa-solid fa-arrow-up"></i>';
                upBtn.className = `text-gray-600 hover:text-white transition ${index === 0 ? 'opacity-30 cursor-not-allowed' : ''}`;
                upBtn.onclick = () => { if(index > 0) moveExercise(index, -1); };

                const downBtn = document.createElement('button');
                downBtn.innerHTML = '<i class="fa-solid fa-arrow-down"></i>';
                downBtn.className = `text-gray-600 hover:text-white transition ${index === availableExercises.length - 1 ? 'opacity-30 cursor-not-allowed' : ''}`;
                downBtn.onclick = () => { if(index < availableExercises.length - 1) moveExercise(index, 1); };

                const renameBtn = document.createElement('button');
                renameBtn.innerHTML = '<i class="fa-solid fa-pen text-[10px]"></i>';
                renameBtn.className = 'w-6 h-6 rounded-full bg-[#111] text-white hover:bg-[#222] transition flex items-center justify-center ml-2';
                
                const delBtn = document.createElement('button');
                delBtn.innerHTML = '<i class="fa-solid fa-times"></i>';
                delBtn.className = 'text-red-500/70 hover:text-red-400 transition ml-1';
                delBtn.onclick = () => removeExerciseFromList(ex);

                renameBtn.onclick = () => {
                    upBtn.style.display = 'none'; downBtn.style.display = 'none'; delBtn.style.display = 'none';
                    const input = document.createElement('input');
                    input.type = 'text'; input.value = ex;
                    input.className = 'w-full bg-[#111] text-white text-sm p-2 rounded-lg focus:outline-none';
                    nameContainer.replaceChild(input, nameText);
                    input.focus();
                    
                    renameBtn.innerHTML = '<i class="fa-solid fa-check text-[#00E676]"></i>';
                    const saveChange = async () => {
                        if (input.value && input.value !== ex) await performRename(ex, input.value);
                        else renderManagerList();
                    };
                    renameBtn.onclick = saveChange;
                    input.onkeydown = (e) => { if(e.key === 'Enter') saveChange(); };
                };

                controls.append(upBtn, downBtn, renameBtn, delBtn);
                div.append(nameContainer, controls);
                managerList.appendChild(div);
            });
        }

        document.getElementById('add-exercise-btn').addEventListener('click', () => {

                document.getElementById('input-weight').value = lastLog.weight;

                    document.getElementById('input-set-count').value = 1;
                    document.getElementById('input-reps').value = "";
                }
                document.getElementById('input-weight').value = '';
            }

            const adviceEl = document.getElementById('log-advice-1rm');
            const exWorkouts = workoutsCache.filter(w => w.exercise === selectedExercise);
            
            if (isCardio) adviceEl.textContent = '';
            else {
                let best1RM = 0;
                exWorkouts.forEach(w => {
                     if (w.weight !== 'BW' && !isNaN(parseFloat(w.weight))) {
                         const est = parseFloat(w.weight) * (1 + (w.reps / 30));
                         if(est > best1RM) best1RM = est;
                     }
                });
                adviceEl.textContent = best1RM > 0 ? `~1RM: ${Math.round(best1RM)} kg` : '';
            }

            const recentHistoryEl = document.getElementById('log-recent-history');
            recentHistoryEl.innerHTML = ''; 
            exWorkouts.slice(0, 3).forEach(item => {
                const dateObj = item.timestamp ? item.timestamp.toDate() : new Date();
                const dFmt = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
                const line = document.createElement('div');
                line.className = "text-[10px] text-gray-500 font-mono tracking-wide";
                if (cardioExercises.includes(item.exercise)) line.textContent = `${dFmt} — ${item.weight} mins`;
                else line.textContent = `${dFmt} — ${item.setCount || 1} sets of ${item.weight === 'BW' ? 'BW' : item.weight+'kg'} × ${item.reps}`; 
                recentHistoryEl.appendChild(line);
            });
        });

        document.getElementById('input-weight').addEventListener('blur', (e) => {
            const val = e.target.value.trim().toUpperCase();
            if (val === 'BW') { e.target.value = 'BW'; return; }
            if(val && !isNaN(val)) e.target.value = parseFloat(val).toFixed(1);
        });

        document.getElementById('log-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const exercise = document.getElementById('input-exercise').value;
            const weight = document.getElementById('input-weight').value;
            const reps = document.getElementById('input-reps').value;
            const numSets = document.getElementById('input-set-count').value;
            
            if (!exercise) { window.showToast("Select an exercise", true); return; }
            
            const isCardio = cardioExercises.includes(exercise);
            let formattedWeight = weight.trim().toUpperCase() === 'BW' && !isCardio ? 'BW' : parseFloat(parseFloat(weight).toFixed(1));
            
            if (formattedWeight !== 'BW' && isNaN(formattedWeight)) {
                window.showToast(isCardio ? "Enter valid minutes" : "Invalid weight", true); return;
            }
            document.getElementById('input-weight').value = formattedWeight === 'BW' ? 'BW' : formattedWeight.toFixed(1);

            try {
                const dateInput = document.getElementById('input-date');
                const [y, m, d] = dateInput.value.split('-').map(Number);

                await addDoc(collection(db, 'users', currentUser.uid, 'workouts'), {
                    exercise: exercise, weight: formattedWeight,
                    reps: isCardio ? 0 : parseInt(reps), setCount: isCardio ? 1 : parseInt(numSets),
                    timestamp: logDate, dateStr: logDate.toLocaleDateString()
                });

                let toastMsg = isCardio ? `Logged: ${exercise} (${formattedWeight} mins)` : `Logged: ${exercise} (${numSets>1?numSets+' Sets':'Set'} - ${formattedWeight==='BW'?'BW':formattedWeight+'kg'} x ${reps})`;
                window.showToast(toastMsg + (dateInput.value === new Date().toISOString().split('T')[0] ? "" : ` on ${logDate.toLocaleDateString()}`));
                
                if (!isCardio) { document.getElementById('input-set-count').value = "1"; document.getElementById('input-reps').value = ""; }
                document.getElementById('input-exercise').value = ""; 
                document.getElementById('log-advice-1rm').textContent = ""; 
                document.getElementById('log-recent-history').innerHTML = "";
            } catch (e) { window.showToast("Error saving workout", true); }
        });

        // --- 5. BODY WEIGHT LOGGING ---
        const btnSaveBW = document.getElementById('btn-save-bw');
        const inputBW = document.getElementById('input-bodyweight');
        const dateInput = document.getElementById('input-date');

        dateInput.addEventListener('change', fetchBodyWeightStatus);

        async function fetchBodyWeightStatus() {
            if (!currentUser) return;
            const display = document.getElementById('last-bw-display');
            const icon = btnSaveBW.querySelector('i');
            const [y, m, d] = dateInput.value.split('-').map(Number);
            const selectedDateStr = new Date(y, m - 1, d).toLocaleDateString();
            
            try {
                const snapTarget = await getDocs(query(collection(db, 'users', currentUser.uid, 'bodyweight'), where("dateStr", "==", selectedDateStr), limit(1)));
                if (!snapTarget.empty) {
                    todayBWDocId = snapTarget.docs[0].id; 
                    inputBW.value = snapTarget.docs[0].data().weight;
                    display.textContent = `${inputBW.value}kg`;
                    inputBW.disabled = true; icon.className = "fa-solid fa-pen text-gray-400";
                } else {
                    todayBWDocId = null; inputBW.disabled = false; icon.className = "fa-solid fa-check";
                    const snapLast = await getDocs(query(collection(db, 'users', currentUser.uid, 'bodyweight'), orderBy("timestamp", "desc"), limit(1)));
                    if (!snapLast.empty) {
                        inputBW.value = snapLast.docs[0].data().weight;
                        display.textContent = `Prev: ${inputBW.value}kg`;
                    } else {
                        display.textContent = `Not logged`; inputBW.value = '';
                    }
                }
            } catch (e) {}
        }

        btnSaveBW.addEventListener('click', async () => {
            const icon = btnSaveBW.querySelector('i');
            if (todayBWDocId && inputBW.disabled) {
                inputBW.disabled = false; inputBW.focus(); icon.className = "fa-solid fa-check"; return;
            }

            let weight = parseFloat(inputBW.value);
            if (weight < 0 || !weight || !currentUser) return;
            weight = parseFloat(weight.toFixed(1));

            const [y, m, d] = dateInput.value.split('-').map(Number);
            const logDate = new Date(y, m - 1, d, 12, 0, 0);

            try {
                if (todayBWDocId) await updateDoc(doc(db, 'users', currentUser.uid, 'bodyweight', todayBWDocId), { weight: weight }); 
                else {
                    const docRef = await addDoc(collection(db, 'users', currentUser.uid, 'bodyweight'), { weight: weight, timestamp: logDate, dateStr: logDate.toLocaleDateString() });
                    todayBWDocId = docRef.id;
                }
                document.getElementById('last-bw-display').textContent = `${weight}kg`;
                inputBW.disabled = true; icon.className = "fa-solid fa-pen text-gray-400";
                window.showToast(`Saved: ${weight}kg`);
            } catch(e) { window.showToast("Error saving", true); }
        });

        // --- 6. REALTIME LISTENERS & HISTORY ---
        function getLocalDateId(dateObj = new Date()) {
            return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
        }

        const setupRealtimeListeners = () => {
            if (!currentUser) return;
            unsubscribes.forEach(unsub => unsub()); unsubscribes = [];

            unsubscribes.push(onSnapshot(query(collection(db, 'users', currentUser.uid, 'workouts'), orderBy("timestamp", "desc"), limit(100)), (snapshot) => {
                workoutsCache = snapshot.docs.map(doc => ({ id: doc.id, type: 'workout', ...doc.data() }));
                refreshHistoryView(); renderToday(workoutsCache); updateChartData(workoutsCache);
                if(document.getElementById('input-exercise').value) document.getElementById('input-exercise').dispatchEvent(new Event('change'));
            }));

            unsubscribes.push(onSnapshot(query(collection(db, 'users', currentUser.uid, 'bodyweight'), orderBy("timestamp", "desc"), limit(20)), (snapshot) => {
                bodyweightCache = snapshot.docs.map(doc => ({ id: doc.id, type: 'bodyweight', ...doc.data() }));
                refreshHistoryView();
            }));

            unsubscribes.push(onSnapshot(query(collection(db, 'users', currentUser.uid, 'sessions'), limit(30)), (snapshot) => {

                            const s = parseInt(document.getElementById(`edit-sets-${item.id}`).value);
                            const r = parseInt(document.getElementById(`edit-reps-${item.id}`).value);
                            const wRaw = document.getElementById(`edit-weight-${item.id}`).value.trim().toUpperCase();
                            const w = wRaw === 'BW' ? 'BW' : parseFloat(parseFloat(wRaw).toFixed(1));
                            
                            if(isNaN(s) || s < 1 || isNaN(r) || r < 0 || (w !== 'BW' && (isNaN(w) || w < 0))) throw new Error();
                            updateData = { setCount: s, reps: r, weight: w };
                        }
                        
                        await updateDoc(doc(db, 'users', currentUser.uid, item.type === 'workout' ? 'workouts' : 'bodyweight', item.id), updateData);
                        window.showToast("Updated successfully");
                    } catch(e) {
                        window.showToast("Invalid values", true);
                    }
                });
            });
        }

        document.getElementById('today-session-name').addEventListener('change', async (e) => {
            if (!currentUser) return;
            const name = e.target.value.trim();
            const todayId = getLocalDateId();
            const ref = doc(db, 'users', currentUser.uid, 'sessions', todayId);
            if (name && name !== todayId) await setDoc(ref, { name: name, dateId: todayId }, { merge: true });
            else await deleteDoc(ref);
        });

        const deleteLog = async (id, collectionName) => {
            try { await deleteDoc(doc(db, 'users', currentUser.uid, collectionName, id)); window.showToast("Deleted"); } 
            catch (e) { window.showToast("Error", true); }
        }

        // Render History
        function renderHistory(items) {
            const container = document.getElementById('history-list');
            if (items.length === 0) { container.innerHTML = '<div class="text-center text-gray-500 mt-10 text-sm">No history yet.</div>'; return; }

            const grouped = {}; const dateIds = {};
            items.forEach(item => {
                const dateObj = item.timestamp ? item.timestamp.toDate() : new Date();
                const dateStr = dateObj.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
                const dateId = getLocalDateId(dateObj);
                if (!grouped[dateStr]) { grouped[dateStr] = []; dateIds[dateStr] = dateId; }
                grouped[dateStr].push(item);
            });

            container.innerHTML = '';
            Object.keys(grouped).forEach(dateStr => {
                const dateId = dateIds[dateStr]; const sessionName = sessionsCache[dateId] || '';
                const displaySessionName = sessionName || dateId;
                
                const dayContainer = document.createElement('div');
                dayContainer.className = "mb-8";
                
                const dateHeader = document.createElement('div');
                dateHeader.className = "flex justify-between items-end border-b border-[#1a1a1a] pb-2 mb-2";
                
                const leftDiv = document.createElement('div');
                leftDiv.innerHTML = `<span class="text-[10px] text-[#00E676] uppercase tracking-widest font-semibold">${dateStr}</span>`;

                const nameContainer = document.createElement('div');
                nameContainer.className = "flex items-center gap-2 group cursor-pointer mt-1";
                nameContainer.innerHTML = `<span class="text-white text-lg font-bold">${displaySessionName}</span><i class="fa-solid fa-pen text-gray-700 text-[10px] opacity-0 group-hover:opacity-100 transition ml-2"></i>`;
                
                nameContainer.addEventListener('click', () => {
                    const input = document.createElement('input');
                    input.type = 'text'; input.value = sessionName; input.placeholder = dateId;
                    input.className = "bg-transparent text-white text-lg font-bold focus:outline-none border-b border-[#333] w-full max-w-[200px]";
                    leftDiv.replaceChild(input, nameContainer); input.focus();
                    const save = async () => {
                        const val = input.value.trim();
                        if (val !== sessionName) {
                            if (val && val !== dateId) await setDoc(doc(db, 'users', currentUser.uid, 'sessions', dateId), { name: val, dateId: dateId }, { merge: true });
                            else await deleteDoc(doc(db, 'users', currentUser.uid, 'sessions', dateId));
                        }
                        leftDiv.replaceChild(nameContainer, input);
                    };
                    input.addEventListener('blur', save); input.addEventListener('keydown', (e) => { if(e.key === 'Enter') input.blur(); });
                });

                leftDiv.appendChild(nameContainer); dateHeader.appendChild(leftDiv);
                dateHeader.innerHTML += `<span class="text-[10px] text-gray-500 font-mono">${grouped[dateStr].length} logs</span>`;
                dayContainer.appendChild(dateHeader);

                const listContainer = document.createElement('div');
                grouped[dateStr].forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'flex justify-between items-center py-3 border-b border-[#111] last:border-0 group transition-colors';
                    if (item.type === 'workout') {
                        const isCardio = cardioExercises.includes(item.exercise);
                        const wDisplay = item.weight === 'BW' ? 'BW' : `${item.weight}kg`;
                        el.innerHTML = `
                            <div class="flex-1">
                                <div class="font-semibold text-gray-200 text-sm">${item.exercise} <span class="text-[9px] text-gray-500 font-normal ml-1">${item.setCount > 1 ? item.setCount+' SETS' : ''}</span></div>
                                <div class="text-xs text-gray-500 mt-0.5">${isCardio ? `${item.weight} mins` : `${wDisplay} × ${item.reps}`}</div>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="text-xs font-mono text-gray-600">${isCardio ? '<i class="fa-solid fa-stopwatch"></i>' : (item.weight==='BW'?'-':(item.weight*item.reps*(item.setCount||1)).toFixed(0))}</div>
                                <button class="edit-log-btn text-gray-600 hover:text-[#00E676] transition p-2"><i class="fa-solid fa-pen"></i></button>
                            </div>
                        `;
                    } else if (item.type === 'bodyweight') {
                        el.innerHTML = `
                            <div class="flex-1 flex items-center gap-2"><i class="fa-solid fa-weight-scale text-gray-500 text-xs"></i><span class="font-semibold text-gray-200 text-sm">Body Weight</span></div>
                            <div class="flex items-center gap-3">
                                <div class="font-bold text-white text-sm">${item.weight}kg</div>
                                <button class="edit-log-btn text-gray-600 hover:text-[#00E676] transition p-2"><i class="fa-solid fa-pen"></i></button>
                            </div>
                        `;
                    }
                    attachEditListeners(el, item, false);
                    listContainer.appendChild(el);
                });
                dayContainer.appendChild(listContainer); container.appendChild(dayContainer);
            });
        }

        function renderToday(workouts) {
            const container = document.getElementById('today-list');
            const todayStr = new Date().toLocaleDateString();
            const todayWorkouts = workouts.filter(w => w.timestamp && w.timestamp.toDate().toLocaleDateString() === todayStr);

            if (todayWorkouts.length === 0) { container.innerHTML = '<div class="text-gray-600 text-xs tracking-wide">Ready to work.</div>'; return; }

            container.innerHTML = '';
            todayWorkouts.forEach(w => {
                 const el = document.createElement('div');
                 el.className = "flex justify-between items-center py-3 border-b border-[#111] last:border-0 group";
                 const isCardio = cardioExercises.includes(w.exercise);
                 const wDisplay = w.weight === 'BW' ? 'BW' : `${w.weight}kg`;
                 
                 el.innerHTML = `
                    <div class="flex-1">
                        <div class="font-semibold text-gray-200 text-sm">${w.exercise} <span class="text-[9px] text-gray-500 font-normal ml-1">${(w.setCount||1) > 1 ? w.setCount+' SETS' : ''}</span></div>
                        <div class="text-xs text-gray-500 mt-0.5">${isCardio ? `${w.weight} mins` : `${w.weight === 'BW' ? 'BW' : w.weight+'kg'} × ${w.reps}`}</div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button class="edit-log-btn text-gray-600 hover:text-[#00E676] transition p-2"><i class="fa-solid fa-pen"></i></button>
                    </div>
                 `;
                 
                 attachEditListeners(el, w, true);
                 container.appendChild(el);
            });
        }

        // --- CHARTS ---
        const ctx = document.getElementById('progressChart').getContext('2d');
        const chartColors = [
            '#00E676', '#3B82F6', '#F59E0B', '#EF4444', '#A855F7', 
            '#EC4899', '#06B6D4', '#F97316', '#8B5CF6', '#14B8A6',
            '#F43F5E', '#10B981', '#6366F1', '#84CC16', '#D946EF'
        ]; 

        function initChart() {
            Chart.defaults.color = '#6B7280';
            Chart.defaults.font.family = 'Inter';
            chartInstance = new Chart(ctx, {
                type: 'line', data: { labels: [], datasets: [] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            display: true, 
                            position: 'bottom',
                            labels: { color: '#9CA3AF', boxWidth: 8, font: {size: 10} }
                        }, 
                        tooltip: { mode: 'index', intersect: false, backgroundColor: '#111', titleColor: '#fff', bodyColor: '#ccc', borderColor: '#333', borderWidth: 1 } 
                    },
                    scales: {
                        y: { border: {display: false}, grid: { color: '#111', drawBorder: false } },
                        x: { border: {display: false}, grid: { display: false } }
                    }
                }
            });
        }

        function updateChartData(workouts) {
            allWorkoutsCache = workouts;
            const exercises = [...new Set(workouts.map(w => w.exercise))].sort();
            const exerciseSelect = document.getElementById('chart-exercise-select');
            const currentSel = exerciseSelect.value || 'All';
            
            exerciseSelect.innerHTML = '<option value="All">Overview</option><option value="Body Weight">Body Weight</option>';
            exercises.forEach(ex => exerciseSelect.innerHTML += `<option value="${ex}">${ex}</option>`);
            exerciseSelect.value = (exercises.includes(currentSel) || currentSel === 'Body Weight') ? currentSel : 'All';
            renderChart(exerciseSelect.value);
        }

        function renderChart(targetExercise) {
            if (!chartInstance) return;
            let relData = targetExercise === 'All' ? [...allWorkoutsCache, ...bodyweightCache] : (targetExercise === 'Body Weight' ? bodyweightCache : allWorkoutsCache.filter(w => w.exercise === targetExercise));
            
            if (relData.length === 0) {
                chartInstance.data.labels = []; chartInstance.data.datasets = []; chartInstance.update();
                ['stat-est-1rm','stat-max-weight','stat-total-volume','stat-total-reps'].forEach(id => document.getElementById(id).textContent = "-");
                return;
            }

            const dateMap = new Map();
            relData.forEach(item => { if(item.timestamp) dateMap.set(item.timestamp.toDate().toLocaleDateString(undefined, {month:'short', day:'numeric'}), item.timestamp.toDate()); });
            const sortedLabels = Array.from(dateMap.keys()).sort((a, b) => dateMap.get(a) - dateMap.get(b));
            let datasets = [];

            if (targetExercise !== 'Body Weight') {
                const exList = targetExercise === 'All' ? [...new Set(allWorkoutsCache.map(w=>w.exercise))] : [targetExercise];
                exList.forEach((ex, i) => { 
                    const map = {};
                    allWorkoutsCache.filter(w=>w.exercise===ex && w.timestamp).forEach(w => {
                        const d = w.timestamp.toDate().toLocaleDateString(undefined, {month:'short', day:'numeric'});
                        const v = w.weight === 'BW' ? null : parseFloat(w.weight);
                        if (v !== null && (!map[d] || v > map[d])) map[d] = v;
                    });
                    datasets.push({ label: ex, data: sortedLabels.map(l => map[l] || null), borderColor: chartColors[i%chartColors.length], borderWidth: 2, tension: 0.4, pointRadius: 0, pointHoverRadius: 4, spanGaps: true });
                });
            }

            if (targetExercise === 'All' || targetExercise === 'Body Weight') {
                const map = {};
                bodyweightCache.forEach(bw => { if(bw.timestamp) map[bw.timestamp.toDate().toLocaleDateString(undefined, {month:'short', day:'numeric'})] = bw.weight; });
                datasets.push({ label: 'Body Weight', data: sortedLabels.map(l => map[l] || null), borderColor: '#333', borderDash: [5, 5], borderWidth: 2, tension: 0.4, pointRadius: 0, spanGaps: true });
            }

            chartInstance.data.labels = sortedLabels; chartInstance.data.datasets = datasets; chartInstance.update();

            // Stats
            if (targetExercise === 'All' || targetExercise === 'Body Weight') {
                ['stat-est-1rm','stat-max-weight','stat-total-volume','stat-total-reps'].forEach(id => document.getElementById(id).textContent = "-");
                document.querySelector('#stat-max-weight').previousElementSibling.textContent = "Peak Load";
                if(targetExercise === 'Body Weight' && datasets[0].data.filter(n=>n).length) {
                    document.getElementById('stat-max-weight').textContent = datasets[0].data.filter(n=>n).pop() + "kg";
                    document.querySelector('#stat-max-weight').previousElementSibling.textContent = "Current Weight";
                }
            } else {
                let maxW=0, best1RM=0, vol=0, reps=0;
                const isCardio = cardioExercises.includes(targetExercise);
                allWorkoutsCache.filter(w=>w.exercise===targetExercise).forEach(w => {
                    const weight = w.weight==='BW'?0:parseFloat(w.weight); const r=w.reps||0; const s=w.setCount||1;
                    if(weight>maxW) maxW=weight;
                    if(!isCardio && w.weight!=='BW') {
                        const est = weight*(1+(r/30)); if(est>best1RM) best1RM=est;
                        vol+=(weight*r*s); reps+=(r*s);
                    }
                });
                if(isCardio) {
                    document.querySelector('#stat-max-weight').previousElementSibling.textContent = "Longest Time";
                    document.getElementById('stat-max-weight').textContent = maxW + " mins";
                    ['stat-est-1rm','stat-total-volume','stat-total-reps'].forEach(id => document.getElementById(id).textContent = "-");
                } else {
                    document.querySelector('#stat-max-weight').previousElementSibling.textContent = "Peak Load";
                    document.getElementById('stat-est-1rm').textContent = Math.round(best1RM)+"kg";
                    document.getElementById('stat-max-weight').textContent = maxW+"kg";
                    document.getElementById('stat-total-volume').textContent = vol>1000 ? (vol/1000).toFixed(1)+"k" : vol;
                    document.getElementById('stat-total-reps').textContent = reps;
                }
            }
        }
        document.getElementById('chart-exercise-select').addEventListener('change', e => renderChart(e.target.value));
        initChart();

        // --- NAVIGATION & TIMERS ---
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                document.querySelectorAll('.view-section').forEach(v => {
                    v.classList.add('hidden'); v.classList.remove('animate-fade-in');
                    if (v.id === link.dataset.target) { v.classList.remove('hidden'); v.classList.add('animate-fade-in'); }
                });
                if (link.dataset.target === 'view-progress' && chartInstance) chartInstance.resize();
            });
        });

        // Rest Timer
        let rT = null, rRem = 0;
        function updateRT() {
            const d = document.getElementById('timer-display'), c = document.getElementById('timer-cancel');
            if(rRem<=0) { d.textContent="00:00"; d.className="text-xl font-mono text-gray-400"; c.classList.add('hidden'); return; }
            d.textContent = `${Math.floor(rRem/60).toString().padStart(2,'0')}:${(rRem%60).toString().padStart(2,'0')}`;
            d.className = `text-xl font-mono text-[#00E676] ${rRem<=5?'animate-pulse':''}`;
            c.classList.remove('hidden');
        }
        document.querySelectorAll('.timer-btn').forEach(b => b.addEventListener('click', e => {
            clearInterval(rT); rRem = parseInt(e.target.dataset.time); updateRT();
            rT = setInterval(() => { rRem--; updateRT(); if(rRem<=0) { clearInterval(rT); navigator.vibrate?.([200,100,200]); } }, 1000);
        }));
        document.getElementById('timer-cancel').addEventListener('click', () => { clearInterval(rT); rRem=0; updateRT(); });

        // Flex UI & Timer
        const fSets = {
            1: ["Planks", "Super man (YWT)", "Child pose/Back Stretch", "Upward/Downward", "Bridge", "V1", "Lungeattack1", "Sky1", "lunge knee 1", "lunge knee deeper hold 1", "hold foot 1", "V2", "Lungeattack2", "Sky2", "lunge knee 2", "lunge knee deeper hold 2", "hold foot 2", "Pigeon 52"],
            2: ["PR Static Hold Left Right", "PR Dynamic Left Right", "PR Dynamic knee/foot up 10 reps each", "PR Dynamic push up using feet", "PR Dynamic Stretch 2 each", "Warriors 1 (30s each L/R)", "Warriors 2 (30s each L/R)", "Warriors 3 (30s each L/R)", "Warriors 4", "Warriors 5", "Labada yoga squat + hands up", "Necks/Arms", "Standing back stretch", "Wall sits", "Monkey", "Bear", "Crab", "Frog"]
        };
        const bF1 = document.getElementById('btn-flex-set-1'), bF2 = document.getElementById('btn-flex-set-2');
        function rFlex(s) {
            bF1.className = s===1 ? "flex-1 py-2.5 text-xs tracking-wide font-semibold rounded-full bg-white text-black shadow-sm transition-all" : "flex-1 py-2.5 text-xs tracking-wide font-semibold rounded-full text-gray-500 hover:text-white transition-all";
            bF2.className = s===2 ? "flex-1 py-2.5 text-xs tracking-wide font-semibold rounded-full bg-white text-black shadow-sm transition-all" : "flex-1 py-2.5 text-xs tracking-wide font-semibold rounded-full text-gray-500 hover:text-white transition-all";
            document.getElementById('flex-set-title').textContent = `Routine ${s}`;
            const l = document.getElementById('flex-list'); l.innerHTML = '';
            fSets[s].forEach((ex, i) => l.innerHTML += `<div class="flex items-center gap-4 py-3 border-b border-[#111] last:border-0"><span class="text-gray-600 text-[10px] font-mono w-4">${i+1}</span><span class="text-sm font-medium text-gray-200">${ex}</span></div>`);
        }
        bF1.addEventListener('click',()=>rFlex(1)); bF2.addEventListener('click',()=>rFlex(2)); rFlex(1);

        let fT = null, fTO = null, fRem = 0, fSel = 0;
        function uFT() {
            const d = document.getElementById('flex-timer-display'), c = document.getElementById('flex-timer-cancel'), st = document.getElementById('flex-timer-status');
            if(fRem<=0 && !fSel) { d.textContent="00:00"; d.className="text-3xl font-mono text-gray-400 font-light"; c.classList.add('hidden'); st.classList.add('hidden'); return; }
            d.textContent = `${Math.floor(fRem/60).toString().padStart(2,'0')}:${(fRem%60).toString().padStart(2,'0')}`;
            d.className = `text-3xl font-mono text-white font-light ${fRem>0&&fRem<=5?'animate-pulse':''}`;
            c.classList.remove('hidden');
        }
        function sFT(sec) {
            clearInterval(fT); clearTimeout(fTO); document.getElementById('flex-timer-status').classList.add('hidden');
            fSel=sec; fRem=sec; uFT();
            fT = setInterval(() => {
                fRem--; uFT();
                if(fRem<=0) {
                    clearInterval(fT); document.getElementById('flex-timer-display').classList.remove('animate-pulse'); navigator.vibrate?.([200,100,200]);
                    document.getElementById('flex-timer-status').classList.remove('hidden');
                    fTO = setTimeout(() => { if(fSel) sFT(fSel); }, 5000);
                }
            }, 1000);
        }
        document.querySelectorAll('.flex-timer-btn').forEach(b => b.addEventListener('click', e => sFT(parseInt(e.target.dataset.time))));
        document.getElementById('flex-timer-cancel').addEventListener('click', () => { clearInterval(fT); clearTimeout(fTO); fRem=0; fSel=0; uFT(); document.getElementById('flex-timer-status').classList.add('hidden'); });

    </script>
</body>
</html>
