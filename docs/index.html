<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MD RepTrack - Minimalist Workout Log</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/reptrack/assets/index-Cz7w4Bvl.js"></script>
  <link rel="stylesheet" crossorigin href="/reptrack/assets/index-CI3IVFHv.css">
</head>
<body class="bg-[var(--bg-deep)] text-[var(--text-main)] min-h-screen selection:bg-[#333]">

    <header class="fixed top-0 left-0 right-0 z-50 h-16 pt-safe flex justify-between items-center px-6 bg-black/80 backdrop-blur-lg border-b border-[#111]">
        <div class="flex items-center gap-2 tracking-widest text-lg font-bold">
            MD REP<span class="text-[#00E676] font-medium">TRACK</span>
        </div>
        <div id="user-info" class="flex items-center gap-4 hidden">
            <span id="user-email" class="text-[10px] text-gray-500 uppercase tracking-widest hidden sm:block"></span>
            <button id="logout-btn" class="text-gray-500 hover:text-white transition">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </div>
    </header>

    <div id="auth-screen" class="fixed inset-0 z-[60] flex flex-col items-center justify-center bg-black p-6 transition-opacity duration-500">
        <div class="text-center mb-12">
            <div class="w-16 h-16 bg-[#111] rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-bolt text-2xl text-[#00E676]"></i>
            </div>
            <h2 class="text-2xl font-semibold tracking-wide mb-2">Welcome</h2>
            <p class="text-sm text-gray-500">Minimalist workout tracking.</p>
        </div>
        
        <div class="w-full max-w-xs space-y-3">
            <input type="email" id="auth-email" placeholder="Email" class="input-field w-full p-4 rounded-2xl text-sm">
            <input type="password" id="auth-password" placeholder="Password" class="input-field w-full p-4 rounded-2xl text-sm">
            
            <div id="auth-error" class="text-red-400 text-xs text-center hidden pt-2"></div>

            <button id="login-btn" class="btn-primary w-full p-4 rounded-full text-sm mt-4 flex items-center justify-center gap-2">
                Sign In
            </button>
            <button id="register-btn" class="w-full p-4 rounded-full bg-transparent text-gray-400 text-sm hover:text-white transition">
                Create Account
            </button>
        </div>

        <div id="auth-loading" class="hidden mt-6">
            <div class="loading-spinner"></div>
        </div>
    </div>
    
    <div id="exercise-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center modal-bg p-4 animate-fade-in">
        <div class="bg-[#0a0a0a] w-full max-w-sm rounded-[24px] p-6 border border-[#1a1a1a] shadow-2xl relative flex flex-col max-h-[80vh]">
            <button id="close-modal-btn" class="absolute top-6 right-6 text-gray-500 hover:text-white">
                <i class="fa-solid fa-times"></i>
            </button>
            <h3 class="text-sm font-semibold uppercase tracking-widest text-gray-400 mb-6">Exercises</h3>
            
            <div class="flex gap-2 mb-6">
                <input type="text" id="new-exercise-input" placeholder="Add custom exercise..." class="input-field flex-1 p-3 rounded-xl text-sm">
                <button id="add-exercise-btn" class="bg-white text-black px-5 rounded-xl transition hover:opacity-90"><i class="fa-solid fa-plus"></i></button>
            </div>
            
            <div id="manage-exercise-list" class="flex-1 overflow-y-auto pr-2 space-y-1">
                </div>
        </div>
    </div>

    <main class="relative w-full pt-20 pb-32 px-5 sm:px-8">
        
        <div id="view-log" class="view-section space-y-8 max-w-md mx-auto">
            
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest">Session Date</span>
                    <div class="flex items-center bg-[#111] rounded-full px-4 py-1.5">
                        <input type="date" id="input-date" class="bg-transparent text-white text-xs font-medium focus:outline-none">
                    </div>
                </div>

                <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-3xl flex flex-col gap-4">
                    <div class="flex justify-between items-center w-full">
                        <h2 class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Rest Timer</h2>
                        <div id="timer-display" class="text-xl font-mono text-gray-400 transition-colors duration-300">00:00</div>
                    </div>
                    <div class="flex justify-between gap-2">
                        <button type="button" class="timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="30">30s</button>
                        <button type="button" class="timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="60">60s</button>
                        <button type="button" class="timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="90">90s</button>
                        <button type="button" class="timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="120">120s</button>
                        <button type="button" id="timer-cancel" class="hidden flex-1 bg-red-500/10 text-red-500 text-xs py-2.5 rounded-full transition-colors font-medium" title="Cancel Timer">Stop</button>
                    </div>
                </div>
            </div>

            <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-3xl flex items-center justify-between">
                <div>
                    <h2 class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Body Weight</h2>
                    <div class="text-white text-sm font-medium mt-1" id="last-bw-display">Not logged</div>
                </div>
                <div class="flex items-center gap-2">
                    <input type="number" id="input-bodyweight" placeholder="0.0" step="0.1" min="0" 
                        class="bg-[#111] w-20 p-3 rounded-xl text-center text-sm font-semibold focus:outline-none focus:ring-1 focus:ring-[#333] text-white disabled:opacity-50">
                    <button id="btn-save-bw" class="bg-white text-black p-3 rounded-xl transition-colors hover:bg-gray-200">
                        <i class="fa-solid fa-check text-xs"></i>
                    </button>
                </div>
            </div>

            <div class="animate-fade-in">
                <form id="log-form" class="space-y-5">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold ml-1 block">Exercise</label>
                            <button type="button" id="open-manager-btn" class="text-[10px] text-gray-500 hover:text-white uppercase tracking-widest transition">
                                Edit List
                            </button>
                        </div>
                        <div class="relative">
                            <select id="input-exercise" class="w-full bg-[#111] p-4 rounded-2xl text-base font-medium appearance-none text-white focus:outline-none focus:ring-1 focus:ring-[#333] transition" required>
                                <option value="" disabled selected>Select Exercise</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                        
                        <div class="flex justify-between items-start mt-2 ml-1 px-1">
                            <div id="log-advice-1rm" class="text-[10px] text-[#00E676] font-mono font-semibold h-4"></div>
                        </div>
                        <div id="log-recent-history" class="mt-2 ml-2 space-y-1.5 border-l border-[#222] pl-3"></div>
                    </div>

                    <div class="grid grid-cols-3 gap-3" id="log-inputs-grid">
                        <div class="col-span-1" id="container-sets">
                            <label class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold ml-1 mb-2 block text-center">Sets</label>
                            <div class="relative">
                                <select id="input-set-count" class="w-full bg-[#111] p-4 rounded-2xl text-base font-semibold text-center appearance-none text-white focus:outline-none focus:ring-1 focus:ring-[#333]">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-span-1" id="container-weight">
                            <label id="label-weight" class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold ml-1 mb-2 block text-center whitespace-nowrap">Load</label>
                            <input type="text" inputmode="text" id="input-weight" placeholder="kg / BW"
                                class="w-full bg-[#111] p-4 rounded-2xl text-base font-semibold text-center text-white placeholder-gray-600 focus:outline-none focus:ring-1 focus:ring-[#333] transition" required>
                        </div>
                        <div class="col-span-1" id="container-reps">
                            <label id="label-reps" class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold ml-1 mb-2 block text-center">Reps</label>
                            <div class="relative">
                                <select id="input-reps" class="w-full bg-[#111] p-4 rounded-2xl text-base font-semibold text-center appearance-none text-white focus:outline-none focus:ring-1 focus:ring-[#333]" required>
                                    <option value="" disabled selected>-</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary w-full p-4 rounded-full text-sm mt-4 tracking-wide shadow-lg">
                        Save Log
                    </button>
                </form>
            </div>

            <div class="pt-6">
                <div class="mb-6 relative">
                    <input type="text" id="today-session-name" placeholder="Name this session..." 
                        class="w-full bg-transparent text-xl font-bold text-white placeholder-gray-700 focus:outline-none pb-2 border-b border-[#222] focus:border-white transition-colors">
                </div>

                <div id="today-list" class="space-y-0">
                    <div class="text-center py-8 text-gray-600 text-xs tracking-wide">Ready to work.</div>
                </div>
            </div>
        </div>

        <div id="view-history" class="view-section hidden max-w-md mx-auto">
            <div class="flex justify-between items-end mb-8">
                <h2 class="text-2xl font-bold">History</h2>
            </div>
            <div id="history-list" class="space-y-0 pb-4">
                <div class="flex justify-center py-10"><div class="loading-spinner"></div></div>
            </div>
        </div>

        <div id="view-progress" class="view-section hidden max-w-md mx-auto space-y-6">
            <h2 class="text-2xl font-bold mb-2">Insights</h2>
            
            <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl">
                <div class="relative mb-6">
                    <select id="chart-exercise-select" class="w-full bg-[#111] p-3 rounded-xl text-sm font-medium appearance-none text-white focus:outline-none border border-transparent focus:border-[#333]">
                        <option value="">Select an exercise...</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </div>
                </div>
                
                <div class="relative h-80 w-full">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl">
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Best 1RM (Est)</div>
                    <div id="stat-est-1rm" class="text-2xl font-bold text-[#00E676]">-</div>
                </div>
                <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl">
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Peak Load</div>
                    <div id="stat-max-weight" class="text-2xl font-bold text-white">-</div>
                </div>
                <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl">
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Total Vol</div>
                    <div id="stat-total-volume" class="text-xl font-semibold text-gray-300">-</div>
                </div>
                <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl">
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Total Reps</div>
                    <div id="stat-total-reps" class="text-xl font-semibold text-gray-300">-</div>
                </div>
            </div>
        </div>

        <div id="view-flexibility" class="view-section hidden max-w-md mx-auto space-y-8">
            <h2 class="text-2xl font-bold">Mobility</h2>
            
            <div class="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-3xl flex flex-col gap-4">
                <div class="flex justify-between items-center w-full">
                    <div class="flex flex-col">
                        <h2 class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Interval Timer</h2>
                        <div id="flex-timer-status" class="text-[9px] text-[#00E676] font-medium hidden animate-pulse mt-0.5">Restarting in 5s...</div>
                    </div>
                    <div id="flex-timer-display" class="text-3xl font-mono text-gray-400 font-light transition-colors duration-300">00:00</div>
                </div>
                <div class="flex justify-between gap-2 mt-2">
                    <button type="button" class="flex-timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="30">30s</button>
                    <button type="button" class="flex-timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="45">45s</button>
                    <button type="button" class="flex-timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="60">60s</button>
                    <button type="button" class="flex-timer-btn flex-1 bg-[#111] hover:bg-[#222] text-gray-400 text-xs py-2.5 rounded-full transition-colors font-medium" data-time="90">90s</button>
                    <button type="button" id="flex-timer-cancel" class="hidden flex-1 bg-red-500/10 text-red-500 text-xs py-2.5 rounded-full transition-colors font-medium" title="Cancel Timer">Stop</button>
                </div>
            </div>

            <div class="flex p-1 bg-[#0a0a0a] rounded-full border border-[#111]">
                <button id="btn-flex-set-1" class="flex-1 py-2.5 text-xs tracking-wide font-semibold rounded-full bg-white text-black shadow-sm transition-all">Routine 1</button>
                <button id="btn-flex-set-2" class="flex-1 py-2.5 text-xs tracking-wide font-semibold rounded-full text-gray-500 hover:text-white transition-all">Routine 2</button>
            </div>

            <div class="">
                <h3 id="flex-set-title" class="text-xs font-bold uppercase tracking-widest text-[#00E676] mb-4 pb-2 border-b border-[#111]">Routine 1</h3>
                <div id="flex-list" class="space-y-0">
                    </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-lg border-t border-[#111] pb-safe pt-2">
        <div class="grid grid-cols-4 items-center h-14 max-w-md mx-auto">
            <button class="nav-link active flex flex-col items-center justify-center w-full h-full gap-1.5" data-target="view-log">
                <i class="fa-solid fa-pen-nib text-lg"></i>
                <span class="text-[9px] font-semibold uppercase tracking-widest">Log</span>
            </button>
            <button class="nav-link flex flex-col items-center justify-center w-full h-full gap-1.5" data-target="view-history">
                <i class="fa-solid fa-layer-group text-lg"></i>
                <span class="text-[9px] font-semibold uppercase tracking-widest">Past</span>
            </button>
            <button class="nav-link flex flex-col items-center justify-center w-full h-full gap-1.5" data-target="view-progress">
                <i class="fa-solid fa-chart-simple text-lg"></i>
                <span class="text-[9px] font-semibold uppercase tracking-widest">Data</span>
            </button>
            <button class="nav-link flex flex-col items-center justify-center w-full h-full gap-1.5" data-target="view-flexibility">
                <i class="fa-solid fa-wave-square text-lg"></i>
                <span class="text-[9px] font-semibold uppercase tracking-widest">Flex</span>
            </button>
        </div>
    </nav>

</body>
</html>
